<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>正在打开分享链接…</title>
    <link rel="stylesheet" href="fonts/local-fonts.css" />
    <style>
        :root { --fg:#333; --bg:#f7f7f7; --panel:#fff; --border:#e0e0e0; }
        @media (prefers-color-scheme: dark) {
            :root { --fg:#ddd; --bg:#1e1e1e; --panel:#252526; --border:#333; }
        }
        html,body { height:100%; }
        body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:var(--fg); background:var(--bg); display:flex; align-items:center; justify-content:center; }
        .card { width:min(720px,92vw); border:1px solid var(--border); background:var(--panel); border-radius:12px; padding:24px; box-shadow: 0 6px 20px rgba(0,0,0,.08); }
        h1 { margin:0 0 8px; font-size:20px; }
        p { margin:6px 0; color:#666; }
        .row { display:flex; gap:10px; margin-top:12px; }
        input.link { flex:1; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--fg); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "JetBrains Mono", monospace; font-size:13px; }
        button { padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:#3498db; color:#fff; cursor:pointer; }
        button.secondary { background:transparent; color:var(--fg); }
        .muted { color:#888; font-size:12px; }
        .ok { color:#28a745; }
        .err { color:#dc3545; }
        .site-footer { margin-top:32px; padding:14px 0 12px; font-size:13px; text-align:center; color:#666; border-top:1px solid var(--border); letter-spacing:0.5px; }
        @media (prefers-color-scheme: dark){ .site-footer { color:#aaa; } }
        .site-footer .partner-link { color:#1a73e8; font-weight:600; text-decoration:none; position:relative; padding:0 4px; }
        @media (prefers-color-scheme: dark){ .site-footer .partner-link { color:#8ab4f8; } }
        .site-footer .partner-link::after { content:''; position:absolute; left:0; bottom:-3px; width:100%; height:2px; background:linear-gradient(90deg,#66a6ff,#89f7fe); transform:scaleX(0); transform-origin:left; transition:transform .35s ease; border-radius:2px; }
        .site-footer .partner-link:hover::after { transform:scaleX(1); }
        @media (prefers-color-scheme: dark){ .site-footer .partner-link::after { background:linear-gradient(90deg,#4e8df2,#5bd4e5); } }
    </style>
</head>
<body>
<div class="card">
    <h1>正在打开分享链接…</h1>
    <p id="status" class="muted">解析中</p>
    <div class="row">
        <input id="target" class="link" readonly value="" aria-label="目标链接" />
        <button id="open">打开</button>
        <button id="copy" class="secondary">复制</button>
    </div>
    <p class="muted" style="margin-top:10px;">若未自动跳转，可点击“打开”。</p>
</div>
<footer class="site-footer">本站由 <a class="partner-link" href="https://app.rainyun.com/" target="_blank" rel="noopener noreferrer" title="雨云 - 云服务器与算力服务">雨云</a> 提供计算服务</footer>

<script>
    (function(){
        function getPayload(){
            try {
                var p = location.pathname || '';
                var i = p.indexOf('/s/');
                if (i !== -1) {
                    var pay = p.substring(i + 3);
                    if (pay.endsWith('/')) pay = pay.slice(0, -1);
                    if (pay) return pay;
                }
            } catch {}
            try { if (location.hash && location.hash.length > 1) return location.hash.slice(1); } catch {}
            try { var u = new URL(location.href); var q = u.searchParams.get('p'); if (q) return q; } catch {}
            return '';
        }
        function getAppBase(){
            try{
                var u = new URL(location.href);
                var p = u.pathname || '/';
                var idx = p.indexOf('/s/');
                if (idx !== -1) {
                    var before = p.substring(0, idx + 1); // keep trailing slash
                    return new URL(before, u.origin).toString();
                }
                return new URL('./', u).toString();
            }catch(e){ return '/'; }
        }

        var payload = getPayload();
        var appBase = getAppBase();
        // Ensure base ends with '/'
        if (appBase.charAt(appBase.length-1) !== '/') appBase += '/';
        var canonical = appBase + 'index.html?z=' + encodeURIComponent(payload || '');
        var statusEl = document.getElementById('status');
        var inputEl = document.getElementById('target');
        var openBtn = document.getElementById('open');
        var copyBtn = document.getElementById('copy');

        inputEl.value = canonical;

        if (!payload) {
            statusEl.textContent = '未检测到有效分享数据';
            statusEl.className = 'err';
            var home = appBase + 'index.html';
            inputEl.value = home;
            openBtn.onclick = function(){ location.replace(home); };
        } else {
            statusEl.textContent = '已解析，即将跳转';
            statusEl.className = 'ok';
            openBtn.onclick = function(){ location.replace(canonical); };
            setTimeout(function(){ try { location.replace(canonical); } catch {} }, 600);
        }

        copyBtn.onclick = function(){
            try { navigator.clipboard.writeText(inputEl.value).then(function(){ statusEl.textContent = '已复制到剪贴板'; statusEl.className='ok'; }); }
            catch(e){ try { inputEl.select(); document.execCommand('copy'); statusEl.textContent='已复制'; statusEl.className='ok'; } catch{} }
        };

        // Normalize address bar to <base>/share.html#<payload>
        try {
            if (payload) {
                var selfUrl = appBase + 'share.html#' + payload;
                if (location.href !== selfUrl) {
                    history.replaceState({}, '', selfUrl);
                }
            }
        } catch {}
    })();
</script>
</body>
</html>
