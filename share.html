<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="description" content="枫下代码 — 正在打开分享链接" />
    <meta name="robots" content="noindex, nofollow" />
    <title>正在打开分享链接… - 枫下代码</title>
    <link rel="stylesheet" href="fonts/local-fonts.css" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c6dd8'/%3E%3Cstop offset='1' stop-color='%233342b7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='ui-sans-serif,system-ui' font-size='34' font-weight='800' text-anchor='middle' fill='white'%3E%E6%9F%9F%3C/text%3E%3C/svg%3E" />
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f7f7;
            --fg: #18181b;
            --muted: #71717a;
            --border: #e4e4e7;
            --panel: rgba(255, 255, 255, 0.72);
            --btn-bg: rgba(255, 255, 255, 0.6);
            --accent: #3342b7;
            --accent-2: #7c6dd8;
            --link: #1a73e8;
            --link-dark: #8ab4f8;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --bg: #0a0a0a;
                --fg: #fafafa;
                --muted: #a1a1aa;
                --border: #27272a;
                --panel: rgba(24, 24, 27, 0.6);
                --btn-bg: rgba(24, 24, 27, 0.5);
            }
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, Roboto, Arial, sans-serif);
            color: var(--fg);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        /* 环境光效（与主站一致） */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(124, 109, 216, 0.18) 0%, transparent 60%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
            animation: ambient 14s ease-in-out infinite alternate;
        }
        @keyframes ambient { from { transform: translate(0, 0); } to { transform: translate(-4vmin, 4vmin); } }

        .card {
            position: relative;
            z-index: 1;
            width: min(640px, 92vw);
            background: var(--panel);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 60px -20px rgba(124, 109, 216, 0.18), 0 0 0 1px var(--border);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 24px; right: 24px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 109, 216, 0.5), transparent);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 600;
            color: var(--fg);
            letter-spacing: -0.01em;
        }
        p { margin: 6px 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
        .row { display: flex; gap: 10px; margin-top: 16px; }
        input.link {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: var(--fg);
            font-family: var(--font-mono, ui-monospace, SFMono-Regular, Menlo, Consolas, "JetBrains Mono", monospace);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input.link:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(124, 109, 216, 0.15); }
        button {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -6px rgba(124, 109, 216, 0.5); }
        button:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }
        button.secondary {
            background: var(--btn-bg);
            color: var(--fg);
            border-color: var(--border);
            box-shadow: none;
        }
        button.secondary:hover { background: rgba(124, 109, 216, 0.08); border-color: var(--accent-2); box-shadow: none; transform: translateY(-1px); }
        .muted { color: var(--muted); font-size: 12px; }
        .ok { color: #16a34a; }
        .err { color: #dc2626; }
        @media (prefers-color-scheme: dark) { .ok { color: #4ade80; } .err { color: #f87171; } }

        .site-footer {
            margin-top: 28px;
            padding: 12px 0 10px;
            font-size: 13px;
            text-align: center;
            color: var(--muted);
            border-top: 1px solid var(--border);
            letter-spacing: 0.5px;
        }
        .site-footer .partner-link {
            color: var(--link);
            font-weight: 600;
            text-decoration: none;
            position: relative;
            padding: 0 4px;
        }
        @media (prefers-color-scheme: dark) { .site-footer .partner-link { color: var(--link-dark); } }
        .site-footer .partner-link::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #66a6ff, #89f7fe);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
            border-radius: 2px;
        }
        .site-footer .partner-link:hover::after { transform: scaleX(1); }
    </style>
</head>
<body>
<div class="card">
    <h1>正在打开分享链接…</h1>
    <p id="status" class="muted">解析中</p>
    <div class="row">
        <input id="target" class="link" readonly value="" aria-label="目标链接" />
        <button id="open">打开</button>
        <button id="copy" class="secondary" aria-label="复制链接">复制</button>
    </div>
    <p class="muted" style="margin-top:10px;">若未自动跳转，可点击"打开"。</p>
    <footer class="site-footer">本站由 <a class="partner-link" href="https://app.rainyun.com/" target="_blank" rel="noopener noreferrer" title="雨云 - 云服务器与算力服务">雨云</a> 提供计算服务</footer>
</div>

<script>
    (function(){
        function getPayload(){
            try {
                var p = location.pathname || '';
                var i = p.indexOf('/s/');
                if (i !== -1) {
                    var pay = p.substring(i + 3);
                    if (pay.endsWith('/')) pay = pay.slice(0, -1);
                    if (pay) return pay;
                }
            } catch {}
            try { if (location.hash && location.hash.length > 1) return location.hash.slice(1); } catch {}
            try { var u = new URL(location.href); var q = u.searchParams.get('p'); if (q) return q; } catch {}
            return '';
        }
        function getAppBase(){
            try{
                var u = new URL(location.href);
                var p = u.pathname || '/';
                var idx = p.indexOf('/s/');
                if (idx !== -1) {
                    var before = p.substring(0, idx + 1); // keep trailing slash
                    return new URL(before, u.origin).toString();
                }
                return new URL('./', u).toString();
            }catch(e){ return '/'; }
        }

        var payload = getPayload();
        var appBase = getAppBase();
        if (appBase.charAt(appBase.length-1) !== '/') appBase += '/';
        var canonical = appBase + 'index.html?z=' + encodeURIComponent(payload || '');
        var statusEl = document.getElementById('status');
        var inputEl = document.getElementById('target');
        var openBtn = document.getElementById('open');
        var copyBtn = document.getElementById('copy');

        inputEl.value = canonical;

        if (!payload) {
            statusEl.textContent = '未检测到有效分享数据';
            statusEl.className = 'err';
            var home = appBase + 'index.html';
            inputEl.value = home;
            openBtn.onclick = function(){ location.replace(home); };
        } else {
            statusEl.textContent = '已解析，即将跳转';
            statusEl.className = 'ok';
            openBtn.onclick = function(){ location.replace(canonical); };
            setTimeout(function(){ try { location.replace(canonical); } catch {} }, 600);
        }

        copyBtn.onclick = function(){
            function onOk(){ statusEl.textContent = '已复制到剪贴板'; statusEl.className='ok'; }
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(inputEl.value).then(onOk).catch(function(){
                        try { inputEl.select(); document.execCommand('copy'); onOk(); } catch {}
                    });
                } else {
                    inputEl.select(); document.execCommand('copy'); onOk();
                }
            } catch(e){ try { inputEl.select(); document.execCommand('copy'); onOk(); } catch{} }
        };

        // Normalize address bar to <base>/share.html#<payload>
        try {
            if (payload) {
                var selfUrl = appBase + 'share.html#' + payload;
                if (location.href !== selfUrl) {
                    history.replaceState({}, '', selfUrl);
                }
            }
        } catch {}
    })();
</script>
</body>
</html>
