        // Early theme bootstrapping: set dark-mode on <html> before paint so loader adopts theme
        (function(){
            try{
                var t = localStorage.getItem('pythonEditorTheme');
                var dark = t ? (t === 'dark') : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if(dark){ document.documentElement.classList.add('dark-mode'); }
            }catch(e){}
        })();

        .status-success { background: #28a745; }
        .status-error { background: #dc3545; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .notification { position: fixed; bottom: 20px; right: 20px; background: var(--panel-bg); color: var(--fg); padding: 15px 20px; border-radius: 6px; border:1px solid var(--panel-border); box-shadow: 0 4px 12px var(--shadow); animation: slideIn 0.2s ease-out; max-width: 300px; z-index: 1000; }

        .notification.success { border-left: 4px solid #28a745; }
        .notification.error { border-left: 4px solid #dc3545; }
        .notification.info { border-left: 4px solid #17a2b8; }
        .notification.warning { border-left: 4px solid #ffc107; }
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center; }
        .modal.active { display:flex; }
        .modal-content { background: var(--panel-bg); color: var(--fg); padding: 30px; border-radius: 8px; max-width: 700px; width: 92%; box-shadow: 0 10px 40px var(--shadow); border:1px solid var(--panel-border); }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .modal-body { margin-bottom: 20px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-footer button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .modal-footer .btn-primary { background: #3498db; color: white; }
        .modal-footer .btn-secondary { background: #6c757d; color: white; }
        @media (max-width: 768px) { #app-container{padding:10px;gap:10px} .playground-wrapper{flex-direction:column;gap:10px} .panel{padding:10px} h2{font-size:20px} .template-selector-wrapper{flex-direction:column} .action-button{font-size:12px;min-width:80px} #output{font-size:14px} header{flex-direction:column;gap:10px;align-items:flex-start} .header-actions{width:100%;justify-content:space-between}}
        .badge { display:inline-block; padding:2px 6px; font-size:12px; color:#fff; background:#6c757d; border-radius:10px; margin-left:8px; }
        .badge.hidden { display:none; }
        .monaco-editor .error-line-decoration { background: rgba(220, 53, 69, 0.15); }
        .monaco-editor .error-line-glyph { background: #dc3545; width: 4px; }
        .tiny-button { font-size:12px; padding:4px 8px; border-radius: 6px; border:1px solid var(--panel-border); background: var(--panel-bg); color: var(--fg); cursor:pointer; }
        /* Scroll fixes for flex layouts */
        .playground-wrapper, .panel, .editor-panel, .output-panel { min-height: 0; }
        #monaco-container, #output { min-height: 0; }
        #output { overflow: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-gutter: stable; }
        /* Global scrollbar styling (Firefox) */
        * { scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-bg); scrollbar-width: thin; }
        /* WebKit scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 8px; border: 2px solid var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--scrollbar-thumb-hover); }
        ::-webkit-scrollbar-corner { background: var(--scrollbar-bg); }
        /* Monaco custom scrollbars */
        .monaco-scrollable-element > .scrollbar.vertical { width: 10px !important; }
        .monaco-scrollable-element > .scrollbar.horizontal { height: 10px !important; }
        .monaco-scrollable-element > .scrollbar { background: transparent !important; }
        .monaco-scrollable-element > .scrollbar > .slider { background: var(--scrollbar-thumb) !important; border-radius: 8px !important; }
        .monaco-scrollable-element > .scrollbar > .slider:hover { background: var(--scrollbar-thumb-hover) !important; }
        /* Zoom hint bubble */
        .zoom-hint { position: fixed; right: 20px; bottom: 80px; background: var(--panel-bg); color: var(--fg); border:1px solid var(--panel-border); box-shadow: 0 4px 12px var(--shadow); padding: 6px 10px; border-radius: 6px; font-size: 12px; z-index: 1200; opacity: 0; transform: translateY(10px); transition: opacity .15s ease, transform .15s ease; }
        .zoom-hint.show { opacity: .95; transform: translateY(0); }
        /* Force editor IME default to English (best-effort) */
        .monaco-editor .inputarea { ime-mode: inactive; }
        /* Data Manager list */
        .file-list { max-height: 260px; overflow:auto; border:1px dashed var(--panel-border); padding:8px; border-radius:6px; }
        .file-item { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border-bottom:1px solid var(--panel-border); font-family: ui-monospace, "JetBrains Mono", monospace; font-size:12px; }
        .file-item:last-child { border-bottom:none; }
        .file-item .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%; }
        .file-item .name.clickable { cursor:pointer; color: var(--link); text-decoration: underline; text-decoration-color: transparent; }
        .file-item .name.clickable:hover { text-decoration-color: currentColor; color: var(--link-hover); }
        .file-item .ops { display:flex; gap:6px; }
        /* Preview editor container, styled like the code editor */
        #preview-editor-container { /* height will be set dynamically */ border: 1px solid var(--panel-border); border-radius:6px; overflow: hidden; background: var(--panel-bg); }
        /* Code editor styles for preview */
        .monaco-editor { font-family: 'JetBrains Mono', 'LXGW WenKai Screen', monospace; font-size: 17px; line-height: 1.7; }
        .preview-controls { display:flex; align-items:center; gap:8px; margin: 6px 0; }
        .preview-controls .muted { color: var(--muted); font-size: 12px; }
    </style>
</head>

    // Helper: build short permalink /s/<payload> from current location
    function buildShortPermalink(state){
        try{
            const payload = window.LZString.compressToEncodedURIComponent(JSON.stringify(state));
            if (!payload || payload.length < 2) {
                const legacy=btoa(unescape(encodeURIComponent(state && state.c ? state.c : '')));
                const u = new URL(window.location.href);
                u.search = '';
                u.hash = '';
                return `${u.origin}${u.pathname.replace(/index\.html$/, '')}?code=${encodeURIComponent(legacy)}`;
            }
            const baseDir = new URL('./', window.location.href);
            // Prefer /s/<payload> whenever current page is controlled by SW (works for local and prod)
            const hasSWController = !!(navigator.serviceWorker && navigator.serviceWorker.controller);
            if (hasSWController) {
                return new URL('./s/' + payload, baseDir).toString();
            }
            // Fallback works everywhere (including first-visit or environments without SW support)
            return new URL('./share.html?p=' + encodeURIComponent(payload), baseDir).toString();
        }catch(e){
            try{
                const legacy=btoa(unescape(encodeURIComponent(state && state.c ? state.c : '')));
                const u = new URL(window.location.href);
                u.search = '';
                u.hash = '';
                return `${u.origin}${u.pathname.replace(/index\.html$/, '')}?code=${encodeURIComponent(legacy)}`;
            }catch{ return window.location.href; }
        }
    }
    // Ensure shortlink has valid z payload; otherwise fallback to legacy ?code=
    function ensureValidShortUrl(url, state){
        try{
            if(!url) throw new Error('empty');
            const u = new URL(url, window.location.href);
            const z = u.searchParams.get('z');
            // allow /s/<payload> and share.html?p= as valid forms
            if((u.pathname.includes('/s/') && u.pathname.split('/s/')[1]) || (u.pathname.endsWith('share.html') && u.searchParams.get('p'))) return u.toString();
            if(z && z.trim().length > 0) return u.toString();
        }catch{}
        // fallback legacy
        try{
            const legacy=btoa(unescape(encodeURIComponent(state && state.c ? state.c : '')));
            const u2 = new URL(window.location.href);
            u2.search = '';
            u2.hash = '';
            return `${u2.origin}${u2.pathname.replace(/index\.html$/, '')}?code=${encodeURIComponent(legacy)}`;
        }catch{ return window.location.href; }
    }

        }
        // Legacy: base64 code param
        if(!codeLoadedFromUrl && urlParams.has('code')){ try{ let raw=urlParams.get('code')||''; let b64; try{ b64=decodeURIComponent(raw); }catch{ b64=raw; } b64=b64.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length%4) b64+='='; const bytes=atob(b64); const decoded=decodeURIComponent(escape(bytes)); StorageManager.saveCode(decoded); codeLoadedFromUrl=true; }catch(e){ console.warn('Failed to decode shared code:',e);} }

        // 支持 ?template=xxx：若没有其它代码载入，则按模板载入代码；否则仅反映选择
        try{
            if(urlParams.has('template')){
                const t = urlParams.get('template');
                // 记录待反映的模板键，供编辑器初始化后同步下拉框
                window.__pendingTpl = t;
                if(!codeLoadedFromUrl && typeof codeTemplates !== 'undefined' && t && codeTemplates[t]){
                    StorageManager.saveCode(codeTemplates[t]);
                    codeLoadedFromUrl = true;
                }
            }
        }catch(e){ console.warn('Failed to handle template param:', e); }

        // 以 SRI + 回退方式加载 LXGW 字体样式，失败时提示并回退到其他 CDN 或去除 SRI
        (function loadLXGWCss(){
            const primary = {
                href: 'https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-screen-webfont/1.6.0/lxgwwenkaiscreen.css',
                integrity: 'sha384-JSVn1znHuc8FVDp6lnwfdr+E/15Rtb/gBqsVMICU1fX4qsG81cPVTaneaJWFM8Ox',
            };
            const fallbacks = [
                { href: 'https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' },
                { href: 'https://unpkg.com/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' }
            ];
            const mount = (opt) => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = opt.href;
                link.referrerPolicy = 'no-referrer';
                if (opt.integrity) { link.integrity = opt.integrity; link.crossOrigin = 'anonymous'; }
                link.onerror = () => {
                    try { document.head.removeChild(link); } catch {}
                    const next = fallbacks.shift();
                    if (next) {
                        try { Notification.show('⚠️ 字体样式 SRI 校验失败，正在使用备用源','warning', 3500); } catch {}
                        mount(next);
                    } else if (opt.integrity) {
                        // 最后再尝试去掉 SRI 重新加载
                        try { Notification.show('⚠️ 所有备用源均不可用，放弃 SRI 继续加载字体','warning', 3500); } catch {}
                        mount({ href: opt.href });
                    }
                };
                document.head.appendChild(link);
            };
            mount(primary);
        })();

        const app = new PythonREPL();
        setTimeout(() => app.main(), 100);

        // Watchdog：如果 6 秒后仍处于 loading，则强制展示页面并提示
        setTimeout(() => {
            if (document.body.classList.contains('loading')) {
                document.body.classList.remove('loading');
                const overlay = document.getElementById('loader-overlay');
                if (overlay) overlay.style.display = 'none';
                try {
                    Notification.show('⚠️ 初始化较慢，已为你显示界面，稍后功能会自动就绪','warning', 4000);
                } catch {}
            }
        }, 6000);

        // 注册 Service Worker（提升弱网/离线体验）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
        }
    });
</script>
