    <script>

        (function(){

                var t = localStorage.getItem('pythonEditorTheme');
                var dark = t ? (t === 'dark') : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

            }catch(e){}
        })();

            --fg: #ddd;

            --panel-border: #333;
            --muted: #aaa;
            --output-bg: #1f1f1f;

        * { box-sizing: border-box; }

        .icon-button:focus-visible[data-tooltip][data-tooltip-pos="bottom"]::after { opacity: 0.95; transform: translate(-50%, 12px); }
        .playground-wrapper { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 2px 10px var(--shadow); display: flex; flex-direction: column; width: 100%; border: 1px solid var(--panel-border); }

        @media (max-width: 768px) { #app-container{padding:10px;gap:10px} .playground-wrapper{flex-direction:column;gap:10px} .panel{padding:10px} h2{font-size:20px} .template-selector-wrapper{flex-direction:column} .action-button{font-size:12px;min-width:80px} #output{font-size:14px} header{flex-direction:column;gap:10px;align-items:flex-start} .header-actions{width:100%;justify-content:space-between}}

        /* Scroll fixes for flex layouts */
        .playground-wrapper, .panel, .editor-panel, .output-panel { min-height: 0; }
        #monaco-container, #output { min-height: 0; }
        #output { overflow: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-gutter: stable; }
        /* Global scrollbar styling (Firefox) */
        * { scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-bg); scrollbar-width: thin; }
        /* WebKit scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 8px; border: 2px solid var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--scrollbar-thumb-hover); }
        ::-webkit-scrollbar-corner { background: var(--scrollbar-bg); }
        /* Monaco custom scrollbars */
        .monaco-scrollable-element > .scrollbar.vertical { width: 10px !important; }
        .monaco-scrollable-element > .scrollbar.horizontal { height: 10px !important; }
        .monaco-scrollable-element > .scrollbar { background: transparent !important; }
        .monaco-scrollable-element > .scrollbar > .slider { background: var(--scrollbar-thumb) !important; border-radius: 8px !important; }
        .monaco-scrollable-element > .scrollbar > .slider:hover { background: var(--scrollbar-thumb-hover) !important; }
        /* Zoom hint bubble */
        .zoom-hint { position: fixed; right: 20px; bottom: 80px; background: var(--panel-bg); color: var(--fg); border:1px solid var(--panel-border); box-shadow: 0 4px 12px var(--shadow); padding: 6px 10px; border-radius: 6px; font-size: 12px; z-index: 1200; opacity: 0; transform: translateY(10px); transition: opacity .15s ease, transform .15s ease; }
        .zoom-hint.show { opacity: .95; transform: translateY(0); }
        /* Force editor IME default to English (best-effort) */
        .monaco-editor .inputarea { ime-mode: inactive; }
    </style>
</head>

<script>
    const CONFIG = { EDITOR:{ fontSize:{desktop:18,mobile:16}, lineHeight:{desktop:28,mobile:24}, debounceMs:1000, font:"'JetBrains Mono', 'LXGW WenKai Screen', monospace", lineHeightFactor: 1.6 }, PACKAGES:{ skipStubs:['numpy'], debounceMs:1500, slowLibraries:['pandas','numpy','scipy','sklearn','tensorflow','torch','cv2','PIL'] }, COMPLETION:{ triggerChars:['.'], cacheExpireMs:1000, requestTimeoutMs:10000, maxSuggestions:30, warmupTimeoutMs:8000 }, RUNTIME:{ executionTimeoutMs:30000, mobileBreakpoint:768 }, FORBIDDEN_MODULES:['subprocess','os.system','__import__','eval','exec'] };

    class WorkerClient { constructor(workerPath, outputEl, progressEl){ this.workerPath=workerPath; this.worker=null; this.reqId=1; this.pending=new Map(); this.outputEl=outputEl; this.progressEl=progressEl; this.indexURL='pyodide/'; this.jediReady=false; this.interruptView=null; }
        async init(indexURL='pyodide/'){ this.indexURL=indexURL; return new Promise((res,rej)=>{ try{ this.worker=new Worker(this.workerPath||'py-worker.js'); this.worker.onmessage=(e)=>this._onMessage(e); res(); }catch(e){ rej(e); } }); }
        async restart(){ try{ this.worker && this.worker.terminate(); }catch{} await this.init(this.indexURL); let resp=await this.request('load',{ indexURL:this.indexURL, prefer:'cdn' }); if(!resp||!resp.success) throw new Error(resp?.error||'加载 Pyodide 失败'); if(this.jediReady){ resp=await this.request('init_jedi',{}); if(!resp||!resp.success) console.warn('Jedi 重新初始化��败:',resp?.error); } if(this.interruptView){ try{ await this.request('setup_interrupt',{ sab:this.interruptView.buffer }); }catch{} } }
        setInterruptView(view){ this.interruptView=view; }
        interrupt(){ if(this.interruptView){ Atomics.store(this.interruptView,0,2); Atomics.notify(this.interruptView,0); return true; } return false; }
        _onMessage(e){ const msg=e.data||{}; const {id,type,payload,text}=msg; switch(type){ case 'response':{ const r=this.pending.get(id); if(r){ this.pending.delete(id); r(payload); } break; } case 'stdout':{ if(this.outputEl){ this.outputEl.textContent += (this.outputEl.textContent? '\n':'') + (text??''); } break; } case 'stderr':{ if(this.outputEl){ this.outputEl.textContent += (this.outputEl.textContent? '\n':'') + (text??''); } break; } case 'progress':{ if(this.progressEl){ this.progressEl.textContent = msg.payload ? `${msg.text} ${msg.payload}` : (msg.text||''); } try{ if(msg.text){ const lower=String(msg.text).toLowerCase(); if(lower.includes('补全')||lower.includes('jedi')){ Notification.show(`🧠 ${msg.text}${msg.payload?('：'+msg.payload):''}`,'info',2500); } else if(lower.includes('安装')){ Notification.show(`📦 ${msg.text}${msg.payload?('：'+msg.payload):''}`,'info',2500); } else if(lower.includes('数据')){ Notification.show(`🗂️ ${msg.text}${msg.payload?('：'+msg.payload):''}`,'info',2000); } }
        }catch(e){}
            break; } default: break; } }
        request(action,payload={}){ return new Promise((res,rej)=>{ if(!this.worker) return rej(new Error('Worker not initialized')); const id=this.reqId++; this.pending.set(id,(resp)=>res(resp)); this.worker.postMessage({ id,type:'request',action,payload }); setTimeout(()=>{ if(this.pending.has(id)){ this.pending.delete(id); rej(new Error(`Worker request '${action}' timeout`)); } }, Math.max(CONFIG.COMPLETION.requestTimeoutMs, CONFIG.RUNTIME.executionTimeoutMs)); }); }
    }

    class Notification { static show(msg,type='info',duration=3000){ const n=document.createElement('div'); n.className=`notification ${type}`; n.textContent=msg; document.body.appendChild(n); setTimeout(()=>{ n.style.animation='slideOut .2s ease-out forwards'; setTimeout(()=>n.remove(),200); },duration); } }

    // New: simple floating zoom hint switched to Notification style
    class ZoomHint {
        static _last = { editor: null, output: null };
        static show(text, kind='info', duration=700){
            try { Notification.show(text, kind, duration); } catch {}
        }
        static showEditor(px){ const v = Math.round(Number(px)||0); if(!v) return; if(this._last.editor===v) return; this._last.editor=v; this.show(`编辑器：${v}px`,'info',700); }
        static showOutput(px){ const v = Math.round(Number(px)||0); if(!v) return; if(this._last.output===v) return; this._last.output=v; this.show(`输出：${v}px`,'info',700); }
    }

                const trySources = [
                    'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.min.js',
                    'https://unpkg.com/monaco-editor@0.47.0/min/vs/loader.min.js',
                    '/monaco/min/vs/loader.js',
                    '/monoca/min/vs/loader.js'

                    if (done) return; if (idx >= trySources.length) return reject(new Error('AMD loader not available'));
                    const s = document.createElement('script');

                    s.crossOrigin = 'anonymous';
                    s.defer = true;
                    // 针对 jsDelivr 源设置已知 SRI，失败则回退到下一个源
                    if (s.src.includes('cdn.jsdelivr.net')) {

                    s.onerror = () => { try { document.head.removeChild(s); } catch {} tryNext(); };
                    document.head.appendChild(s);
                };

            });

            const bases = [
                'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs',
                'https://unpkg.com/monaco-editor@0.47.0/min/vs',
                '/monaco/min/vs',
                '/monoca/min/vs'

            const tryLoad = (base) => new Promise((resolve, reject) => {
                try { require.config({ paths: { 'vs': base }}); } catch (e) { return reject(e); }
                window.MonacoEnvironment = undefined;
                let finished = false;
                const t = setTimeout(() => { if (finished) return; finished = true; reject(new Error('Monaco load timeout')); }, 2500);

            });

            if (typeof require === 'undefined') {
                try { await ensureAmdLoader(); } catch (e) { throw new Error('Monaco 加载器不可用'); }
            }
            let lastErr;

                try { await tryLoad(base); return; } catch (e) { lastErr = e; console.warn('Monaco load failed from', base, e?.message || e); }

                    const curPx = parseFloat(style.fontSize) || 15;
                    const dir = ev.deltaY < 0 ? 1 : -1;
                    const step = Math.abs(ev.deltaY) >= 50 ? 2 : 1;
                    const next = clamp(Math.round(curPx + dir*step), 10, 28);
                    outputEl.style.fontSize = `${next}px`;
                    StorageManager.setOutputFontSize(next);
                    ZoomHint.showOutput(next);
                }, { passive: false });
            } catch (e) { console.warn('Bind wheel zoom failed:', e); }

            // 资源加载失败友好提示
            window.addEventListener('error', (ev) => {
                const t = ev && ev.target;
                if (!t || !(t.tagName === 'SCRIPT' || t.tagName === 'LINK')) return;
                try {
                    const url = t.src || t.href || '';
                    Notification.show(`⚠️ 资源加载失败，已尝试备用源：${url}`,'warning', 4000);
                } catch {}
            }, true);
        }
        initAdaptiveTooltips(){
            const buttons = document.querySelectorAll('.icon-button[data-tooltip]');
            const choose = (el)=>{
                const r = el.getBoundingClientRect();
                const topSpace = r.top;
                const bottomSpace = window.innerHeight - r.bottom;
                // 头部区域通常靠近顶部，默认放底部；如果底部空间不足且顶部空间更大，放顶部
                const pos = (bottomSpace < 30 && topSpace > bottomSpace) ? 'top' : 'bottom';
                el.setAttribute('data-tooltip-pos', pos);
            };
            buttons.forEach(btn=>{
                // 默认先放底部，避免顶部遮挡
                btn.setAttribute('data-tooltip-pos','bottom');
                btn.addEventListener('mouseenter', ()=>choose(btn));
                btn.addEventListener('focus', ()=>choose(btn));
            });
            // 监听窗口变化，重新评估
            window.addEventListener('resize', ()=>{ buttons.forEach(choose); });
        }
        setupTemplateSelector(selector){ if(!selector) return; selector.innerHTML=''; const def=document.createElement('option'); def.textContent='— 从这里选择一个代码示例 —'; def.value=''; def.selected=true; selector.appendChild(def); if(typeof codeTemplates==='undefined'){ console.warn('codeTemplates is not loaded'); return; } if(!codeTemplates['Pandas (DataFrame)']){ codeTemplates['Pandas (DataFrame)'] = `import pandas as pd\n\ndata = { 'A':[1,2,3], 'B':['x','y','z'] }\n\ndf = pd.DataFrame(data)\nprint(df)\n# 另起一行，输入 'df.' 测试实例补全`; } if(!codeTemplates['Pandas (本地CSV)']){ codeTemplates['Pandas (本地CSV)'] = `import pandas as pd\n# 示例数据已挂载到 /data 目录\n# 首次加载可能稍慢，请耐心等待\n\ndf = pd.read_csv('/data/boston_housing.csv')\nprint(df.head())\n# 另起一行，输入 'df.' 查看 DataFrame 补全`; } for(const key in codeTemplates){ const opt=document.createElement('option'); opt.value=key; opt.textContent=key; selector.appendChild(opt); } selector.addEventListener('change',(ev)=>{ const k=ev.target.value; if(!k){ this.editor.setValue(''); return; } if(codeTemplates[k]){ this.editor.setValue(codeTemplates[k]); Notification.show(`📚 已加载示例: ${k}`,'success'); try{ const url=new URL(window.location); url.searchParams.set('template',k); url.searchParams.delete('code'); window.history.pushState({},'',url); }catch(e){ console.warn('update URL failed',e);} } }); }
        async stop(){ if(this.workerClient && this.workerClient.interrupt && this.workerClient.interrupt()){ Notification.show('⏹️ 已请求停止（将触发 KeyboardInterrupt）','warning'); return; } try{ await this.workerClient.restart(); Notification.show('⏹️ 已重启后台以停止任务','warning'); }catch(e){ Notification.show('❌ 停止失败：'+(e.message||e),'error'); } }
        async runCode(){ const runButton=document.getElementById('run-button'); const outputElement=document.getElementById('output'); const execTimeElement=document.getElementById('exec-time'); const status=document.querySelector('.status-indicator'); const jumpError=document.getElementById('jump-error');
            if(!this.workerClient||!this.editor){ Notification.show('⚠️ 环境未就绪','error'); return; }
            try{ if(this.editor?.editor && this.errorDecorations?.length){ this.errorDecorations=this.editor.editor.deltaDecorations(this.errorDecorations,[]); } this.lastErrorLine=null; jumpError.style.display='none'; if(this.workerClient.interruptView){ Atomics.store(this.workerClient.interruptView,0,0); }
                // Clear previous error markers to avoid stale highlights
                try{ const model=this.editor?.editor?.getModel && this.editor.editor.getModel(); if(model && this.monaco?.editor?.setModelMarkers){ this.monaco.editor.setModelMarkers(model,'py',[]); } }catch{}
            }catch{}
            runButton.disabled=true; runButton.textContent='⏳ 运行中...'; status.className='status-indicator status-running'; outputElement.textContent='🚀 正在执行代码...';
            try{ const code=this.editor.getValue(); const pkgs=await this.packageManager.findNewPackages(code); if(pkgs.size>0){ outputElement.textContent=`🔔 安装模块: ${Array.from(pkgs).join(', ')}...`; await this.packageManager.installPackages(pkgs,false); }
                const result=await this.codeExecutor.execute(code);
                if(result.success){ status.className='status-indicator status-success'; outputElement.textContent=result.output; execTimeElement.textContent=`✅ 执行完成 (${result.time}s)`;
                    // Ensure markers are cleared after success
                    try{ const model=this.editor?.editor?.getModel && this.editor.editor.getModel(); if(model && this.monaco?.editor?.setModelMarkers){ this.monaco.editor.setModelMarkers(model,'py',[]); } }catch{}
                    Notification.show('✅ 代码执行成功','success',2000);
                } else { status.className='status-indicator status-error'; outputElement.textContent=result.output; execTimeElement.textContent=`❌ 执行失败 (${result.time}s)`; const line=result.line; if(typeof line==='number' && this.editor?.editor){ try{ const m=this.monaco; const col = (result.col && Number.isFinite(result.col)) ? Math.max(1, result.col) : 1; this.editor.editor.revealLineInCenter(line);
                    const range = new m.Range(line, col, line, col+1);
                    this.errorDecorations=this.editor.editor.deltaDecorations(this.errorDecorations,[{ range: range, options:{ isWholeLine: !result.col, className:'error-line-decoration', glyphMarginClassName:'error-line-glyph' } }]); this.lastErrorLine=line; jumpError.style.display='inline-block';
                    const model=this.editor.editor.getModel(); m.editor.setModelMarkers(model,'py',[{ startLineNumber: line, startColumn: col, endLineNumber: line, endColumn: Math.max(col,2), message: '运行出错，详见输出区', severity: m.MarkerSeverity.Error }]); }catch(e){ console.warn('Decorations failed:',e);} }
                    Notification.show('❌ 代码执行出错','error'); }
            } catch(e){ status.className='status-indicator status-error'; outputElement.textContent=`❌ 执行失败: ${e.message}`; execTimeElement.textContent='❌ 执行中止'; Notification.show(`❌ ${e.message}`,'error'); }
            finally{ try{ if(this.workerClient.interruptView) Atomics.store(this.workerClient.interruptView,0,0); }catch{} runButton.disabled=false; runButton.textContent='▶️ 运行'; }
        }
        async formatCode(){ Notification.show('💡 代码格式化功能开发中...','info'); }
        shareCode(){ const code=this.editor.getValue(); const encoded=btoa(unescape(encodeURIComponent(code))); const shareUrl=`${window.location.origin}${window.location.pathname}?code=${encoded}`; navigator.clipboard.writeText(shareUrl).then(()=>{ const modal=document.getElementById('share-modal'); document.getElementById('share-url').value=shareUrl; modal.classList.add('active'); Notification.show('✅ 分享链接已复制到剪贴板','success'); }).catch(()=>{ Notification.show('❌ 复制失败，请手动复制','error'); }); }
        clearCode(){ if(confirm('确定要��空代码吗？')){ this.editor.setValue(''); StorageManager.saveCode(''); Notification.show('🗑️ 代码已清空','info'); } }
        clearOutput(){ document.getElementById('output').textContent='清空完成'; document.getElementById('exec-time').textContent='就绪'; Notification.show('🗑️ 输出已清空','info'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Sync body class with html early to keep loader and content consistent
        if (document.documentElement.classList.contains('dark-mode')) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }

        const urlParams=new URLSearchParams(window.location.search); let codeLoadedFromUrl=false; if(urlParams.has('template')){ const k=urlParams.get('template'); if(typeof codeTemplates!=='undefined' && codeTemplates[k]){ StorageManager.saveCode(codeTemplates[k]); codeLoadedFromUrl=true; } }
        if(!codeLoadedFromUrl && urlParams.has('code')){ try{ const decoded=decodeURIComponent(escape(atob(urlParams.get('code')))); StorageManager.saveCode(decoded); codeLoadedFromUrl=true; }catch(e){ console.warn('Failed to decode shared code:',e);} }
        // 以 SRI + 回退方式加载 LXGW 字体样式，失败时提示并回退到其他 CDN 或去除 SRI
        (function loadLXGWCss(){
            const primary = {
                href: 'https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-screen-webfont/1.6.0/lxgwwenkaiscreen.css',
                integrity: 'sha384-JSVn1znHuc8FVDp6lnwfdr+E/15Rtb/gBqsVMICU1fX4qsG81cPVTaneaJWFM8Ox',
            };
            const fallbacks = [
                { href: 'https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' },
                { href: 'https://unpkg.com/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' }
            ];
            const mount = (opt) => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = opt.href;
                link.referrerPolicy = 'no-referrer';
                if (opt.integrity) { link.integrity = opt.integrity; link.crossOrigin = 'anonymous'; }
                link.onerror = () => {
                    try { document.head.removeChild(link); } catch {}
                    const next = fallbacks.shift();
                    if (next) {
                        try { Notification.show('⚠️ 字体样式 SRI 校验失败，正在使用备用源','warning', 3500); } catch {}
                        mount(next);
                    } else if (opt.integrity) {
                        // 最后再尝试去掉 SRI 重新加载
                        try { Notification.show('⚠️ 所有备用源均不可用，放弃 SRI 继续加载字体','warning', 3500); } catch {}
                        mount({ href: opt.href });
                    }
                };
                document.head.appendChild(link);
            };
            mount(primary);
        })();

        const app = new PythonREPL();
        setTimeout(() => app.main(), 100);

        // Watchdog：如果 6 秒后仍处于 loading，则强制展示页面并提示
        setTimeout(() => {
            if (document.body.classList.contains('loading')) {
                document.body.classList.remove('loading');
                const overlay = document.getElementById('loader-overlay');
                if (overlay) overlay.style.display = 'none';
                try {
                    Notification.show('⚠️ 初始化较慢，已为你显示界面，稍后功能会自动就绪','warning', 4000);
                } catch {}
            }
        }, 6000);

        // 注册 Service Worker（提升弱网/离线体验）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
        }
    });
</script>
