    <style>
        /* 浏览器原生 color-scheme — 让滚动条/表单/链接自动跟随主题 */
        :root { color-scheme: light; }
        :root.dark-mode { color-scheme: dark; }

    <script>
        // Early theme bootstrapping: set dark-mode on <html> and <body> before paint so loader adopts theme
        (function(){
            try{
                var t = localStorage.getItem('pythonEditorTheme');
                var dark = t ? (t === 'dark') : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if(dark){
                    document.documentElement.classList.add('dark-mode');
                    document.body.classList.add('dark-mode');
                    // Set initial theme icon to sun (since dark is active)
                    var db = document.getElementById('dark-mode-button');
                    if(db){ db.setAttribute('data-tooltip','浅色模式'); }
                }
            }catch(e){}
        })();
    </script>

    <style>
        /* ===== Design System — 21st.dev / shadcn aesthetic ===== */
        :root {
            --bg: #ffffff;
            --fg: #09090b;
            --panel-bg: #ffffff;
            --panel-border: #e4e4e7;
            --muted: #71717a;
            --output-bg: #f4f4f5;
            --btn-bg: #ffffff;
            --btn-fg: #09090b;
            --scrollbar-bg: #f4f4f5;
            --scrollbar-thumb: #d4d4d8;
            --scrollbar-thumb-hover: #a1a1aa;
            --link: #3b82f6;
            --link-hover: #2563eb;
            --accent: #18181b;
            --accent-light: #3f3f46;
            --accent-subtle: #f4f4f5;
            --accent-muted: #e4e4e7;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --radius-xl: 14px;
            --radius-full: 9999px;
            --transition-fast: 0.12s ease;
            --transition-smooth: 0.2s ease;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'LXGW WenKai Screen', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;
        }
        .dark-mode {
            --bg: #09090b;
            --fg: #fafafa;
            --panel-bg: #09090b;
            --panel-border: #27272a;
            --muted: #a1a1aa;
            --output-bg: #18181b;
            --btn-bg: #18181b;
            --btn-fg: #fafafa;
            --scrollbar-bg: #18181b;
            --scrollbar-thumb: #3f3f46;
            --scrollbar-thumb-hover: #52525b;
            --link: #60a5fa;
            --link-hover: #93c5fd;
            --accent: #fafafa;
            --accent-light: #e4e4e7;
            --accent-subtle: #18181b;
            --accent-muted: #27272a;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: var(--font-sans); margin: 0; overflow: hidden; background: var(--bg); color: var(--fg); }
        /* ===== Loader ===== */
        #loader-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        body.loading #loader-overlay { display: flex; }
        body.loading #app-container { display: none; }
        .loader-ring { width: 32px; height: 32px; border: 2px solid var(--panel-border); border-top-color: var(--fg); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        #loading-text { margin-top: var(--sp-4); font-size: 13px; color: var(--fg); font-weight: 500; }
        #loading-progress { margin-top: var(--sp-1); font-size: 11px; color: var(--muted); }
        /* ===== App Container ===== */
        #app-container { display: flex; flex-direction: column; height: 100%; padding: var(--sp-3) var(--sp-4); gap: var(--sp-3); }
        /* ===== Header ===== */
        header { display: flex; justify-content: space-between; align-items: center; padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-lg); background: var(--panel-bg); border: 1px solid var(--panel-border); }
        h2 { margin: 0; color: var(--fg); font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
        .header-actions { display: flex; gap: var(--sp-2); align-items: center; }
        /* ===== Icon Buttons ===== */
        .icon-button { position: relative; width: 34px; height: 34px; border: 1px solid var(--panel-border); border-radius: var(--radius-sm); background: var(--btn-bg); color: var(--btn-fg); cursor: pointer; font-size: 0; transition: background var(--transition-fast), border-color var(--transition-fast); display: flex; align-items: center; justify-content: center; }
        .icon-button:hover { background: var(--accent-subtle); border-color: var(--accent-muted); }
        .icon-button:active { background: var(--accent-muted); }
        .icon-button svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-button:focus-visible { outline: 2px solid var(--link); outline-offset: 2px; }
        /* Tooltips */
        .icon-button[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute; left: 50%; white-space: nowrap; background: #18181b; color: #fafafa; font-size: 11px; padding: 3px 8px; border-radius: var(--radius-sm); opacity: 0; pointer-events: none; transition: opacity var(--transition-fast), transform var(--transition-fast); z-index: 100;
        }
        .dark-mode .icon-button[data-tooltip]::after { background: #27272a; }
        .icon-button[data-tooltip][data-tooltip-pos="top"]::after { bottom: 100%; transform: translate(-50%, -6px); }
        .icon-button:hover[data-tooltip][data-tooltip-pos="top"]::after,
        .icon-button:focus-visible[data-tooltip][data-tooltip-pos="top"]::after { opacity: 0.95; transform: translate(-50%, -10px); }
        .icon-button[data-tooltip][data-tooltip-pos="bottom"]::after { top: 100%; transform: translate(-50%, 6px); }
        .icon-button:hover[data-tooltip][data-tooltip-pos="bottom"]::after,
        .icon-button:focus-visible[data-tooltip][data-tooltip-pos="bottom"]::after { opacity: 0.95; transform: translate(-50%, 10px); }
        /* ===== Playground ===== */
        .playground-wrapper { display: flex; flex: 1; gap: var(--sp-3); overflow: hidden; }
        /* ===== Panels ===== */
        .panel { background: var(--panel-bg); padding: var(--sp-4); border-radius: var(--radius-lg); display: flex; flex-direction: column; width: 100%; border: 1px solid var(--panel-border); position: relative; overflow: hidden; }
        .editor-panel { flex-basis: 48%; }
        .output-panel { flex-basis: 52%; }
        .editor-panel:focus-within { border-color: var(--muted); }
        /* ===== Template Selector ===== */
        .template-selector-wrapper { position: relative; margin-bottom: var(--sp-3); display: flex; gap: var(--sp-3); align-items: center; }
        .template-selector-wrapper label { font-size: 13px; color: var(--muted); font-weight: 500; }
        #template-selector { flex: 1; padding: 8px 36px 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--panel-border); font-size: 13px; font-weight: 500; background-color: var(--btn-bg); color: var(--fg); outline: none; cursor: pointer; transition: border-color var(--transition-fast); -webkit-appearance: none; appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
        #template-selector:hover { border-color: var(--muted); }
        #template-selector:focus, #template-selector:focus-visible { border-color: var(--fg); }
        /* Template dropdown panel (custom) */
        .ts-trigger { flex:1; padding:8px 36px 8px 12px; border-radius:var(--radius-sm); border:1px solid var(--panel-border); font-size:13px; font-weight:500; background-color:var(--btn-bg); color:var(--fg); outline:none; cursor:pointer; transition:border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast); text-align:left; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; position:relative; -webkit-appearance:none; appearance:none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; font-family: inherit; }
        .ts-trigger:hover { border-color: var(--muted); }
        .ts-trigger:focus, .ts-trigger:focus-visible { border-color: var(--fg); box-shadow: 0 0 0 3px var(--accent-subtle); }
        .ts-trigger[data-open="true"] { border-color: var(--fg); box-shadow: 0 0 0 3px var(--accent-subtle); }
        .ts-trigger .ts-trigger-placeholder { color: var(--muted); }
        .template-selector-wrapper.compact .ts-trigger { padding:6px 34px 6px 10px; font-size:12px; }
        #template-selector { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0, 0, 0, 0) !important; white-space: nowrap !important; border: 0 !important; display: none !important; visibility: hidden !important; pointer-events: none !important; user-select: none !important; -webkit-user-select: none !important; }
        .ts-panel { position:absolute; left:0; top:100%; width:100%; max-height:340px; overflow:auto; border:1px solid var(--panel-border); background:var(--panel-bg); border-radius:var(--radius-md); margin-top:6px; padding:8px 0; z-index:1200; display:none; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.25), 0 0 0 1px var(--panel-border); }
        .ts-panel.open { display:block; animation:tsFade .15s ease; }
        @keyframes tsFade { from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }
        .ts-search-wrap { padding:0 12px 6px; }
        .ts-search { width:100%; padding:7px 10px; font-size:13px; border:1px solid var(--panel-border); background:var(--btn-bg); color:var(--fg); border-radius:var(--radius-sm); outline:none; transition:border-color var(--transition-fast); }
        .ts-search:focus { border-color:var(--fg); }
        .ts-options { list-style:none; margin:0; padding:0; }
        .ts-option { padding:7px 14px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:6px; line-height:1.3; transition:background .12s; }
        .ts-option[data-selected="true"] { background:var(--accent-subtle); font-weight:600; }
        .ts-option:hover, .ts-option:focus { background:var(--accent-subtle); outline:none; }
        .ts-empty { padding:10px 16px; font-size:12px; color:var(--muted); }
        .ts-footer { padding:6px 12px 4px; display:flex; justify-content:space-between; gap:8px; }
        .ts-footer button { flex:1; font-size:12px; padding:6px 10px; border-radius:var(--radius-sm); border:1px solid var(--panel-border); background:var(--btn-bg); color:var(--fg); cursor:pointer; }
        .ts-footer button:hover { background:var(--accent-subtle); }
        .ts-option mark { background:transparent; color:var(--link); font-weight:600; }
        .template-selector-wrapper.compact #template-selector { /* intentionally left empty — inherit the !important hide rule above */ }
        .template-selector-wrapper.compact .ts-option { padding:5px 12px; }
        /* ===== Monaco Container ===== */
        #monaco-container { flex: 1; min-height: 120px; border: 1px solid var(--panel-border); border-radius: var(--radius-md); overflow: hidden; margin: var(--sp-2) 0; background: var(--panel-bg); }
        /* ===== Toolbar / Action Bar (shadcn-style) ===== */
        .button-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-top: var(--sp-3);
            border-top: 1px solid var(--panel-border);
            margin-top: auto;
        }
        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 6px 14px;
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 500;
            font-family: var(--font-sans);
            line-height: 1;
            white-space: nowrap;
            background: transparent;
            color: var(--fg);
            transition: all var(--transition-fast);
            user-select: none;
        }
        .action-button svg {
            width: 14px; height: 14px;
            fill: none; stroke: currentColor;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            flex-shrink: 0;
        }
        .action-button:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .action-button:hover:not(:disabled) { background: var(--accent-subtle); border-color: var(--muted); }
        .action-button:active:not(:disabled) { background: var(--accent-muted); }
        .action-button:focus-visible { outline: 2px solid var(--link); outline-offset: 2px; }
        /* Primary — solid dark */
        #run-button { background: var(--fg); color: var(--bg); border-color: var(--fg); font-weight: 600; }
        #run-button:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent-light); }
        /* ===== Output ===== */
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-2); }
        .output-header h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--fg); }
        .output-stats { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: var(--sp-2); }
        #output { flex: 1; border: 1px solid var(--panel-border); background: var(--output-bg); color: var(--fg); padding: var(--sp-3) var(--sp-4); white-space: pre-wrap; word-wrap: break-word; border-radius: var(--radius-md); overflow-y: auto; font-family: var(--font-mono); font-size: 14px; line-height: 1.6; }
        /* ===== Status Indicator ===== */
        .status-indicator { display: inline-flex; align-items: center; justify-content: center; width: 8px; height: 8px; border-radius: var(--radius-full); margin-right: 4px; }
        .status-idle { background: var(--muted); }
        .status-running { background: var(--fg); animation: pulse 1.2s ease infinite; }
        .status-success { background: #22c55e; }
        .status-error { background: #ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        /* ===== Notifications ===== */
        .notification { position: fixed; bottom: var(--sp-5); right: var(--sp-5); background: var(--panel-bg); color: var(--fg); padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-md); border: 1px solid var(--panel-border); animation: slideIn 0.2s ease; max-width: 280px; z-index: 1000; font-size: 13px; font-weight: 500; }
        @keyframes slideIn { from{transform:translateX(280px);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes slideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(280px);opacity:0} }
        .notification.success { border-left: 3px solid #22c55e; }
        .notification.error { border-left: 3px solid #ef4444; }
        .notification.info { border-left: 3px solid var(--link); }
        .notification.warning { border-left: 3px solid #f59e0b; }
        /* ===== Modals ===== */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:2000; justify-content:center; align-items:center; }
        .dark-mode .modal { background:rgba(0,0,0,0.6); }
        .modal.active { display:flex; animation: modalFadeIn 0.15s ease; }
        @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }
        .modal-content { background: var(--panel-bg); color: var(--fg); padding: var(--sp-6); border-radius: var(--radius-xl); max-width: 700px; width: 92%; border: 1px solid var(--panel-border); position:relative; overflow:hidden; }
        .modal-header { font-size: 15px; font-weight: 600; margin-bottom: var(--sp-3); }
        .modal-body { margin-bottom: var(--sp-4); }
        .modal-footer { display: flex; gap: var(--sp-2); justify-content: flex-end; }
        .modal-footer button { padding: 7px 16px; border: 1px solid var(--panel-border); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500; transition: background var(--transition-fast); background: var(--btn-bg); color: var(--btn-fg); }
        .modal-footer .btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .modal-footer .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
        .modal-footer .btn-secondary { background: var(--btn-bg); color: var(--btn-fg); }
        .modal-footer .btn-secondary:hover { background: var(--accent-subtle); }
        /* ===== Share Type Switch (长链/短链 切换按钮) ===== */
        .share-type-switch { display: flex; gap: 6px; margin-top: 10px; }
        .share-type-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 7px 10px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            background: var(--btn-bg);
            color: var(--fg);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            line-height: 1;
            white-space: nowrap;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }
        .share-type-btn svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            display: block;
        }
        .share-type-btn:hover { background: var(--accent-subtle); border-color: var(--accent-light); }
        .share-type-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .share-type-btn.active svg { color: var(--bg); }
        .share-type-btn:focus-visible { outline: 2px solid var(--link); outline-offset: 2px; }
        /* ===== Badge ===== */

    class Notification {
        // 通知去重：相同内容在 cooldownMs 内只弹一次

        static _cooldownMs = 1800;
        static _maxVisible = 3;     // 同时最多显示 3 个
        static _container = null;
        static _ensureContainer(){
            if (this._container && document.body.contains(this._container)) return this._container;
            let el = document.getElementById('notification-container');
            if (!el) {
                el = document.createElement('div');
                el.id = 'notification-container';
                el.style.cssText = 'position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column-reverse;gap:8px;z-index:1000;pointer-events:none;';
                document.body.appendChild(el);

            this._container = el;
            return el;
        }
        static show(msg, type='info', duration=3000){
            try {
                const key = String(msg || '');
                if (!key) return;
                const now = Date.now();
                const last = this._recent.get(key);
                if (last && (now - last.ts) < this._cooldownMs) {

                    return;

                    this._dismiss(container.firstElementChild);
                }
                const n = document.createElement('div');
                n.className = `notification ${type}`;
                n.textContent = key;
                n.style.cssText = 'pointer-events:auto;';
                container.appendChild(n);
                const hideTimer = setTimeout(() => this._dismiss(n), duration);
                this._recent.set(key, { ts: now, el: n, _hideTimer: hideTimer });

        }

                    while (this._container.firstChild) this._container.firstChild.remove();

            } catch {}
        }
    }

    // ShareStore: localStorage-based temporary code share with expiration.
    // Generates short IDs so share URLs stay compact regardless of code size.

                if (openBtn) openBtn.onclick = () => { const u = input.value || url; window.open(u, '_blank'); };

                // 切换按钮可见性 & 状态
                if (longBtn) longBtn.style.display = longUsable ? '' : 'none';
                if (shortBtn) shortBtn.style.display = shortUsable ? '' : 'none';
                if (longBtn) longBtn.classList.toggle('active', type === 'long');
                if (shortBtn) shortBtn.classList.toggle('active', type === 'short');

                // 点击切换类型
                if (longBtn) longBtn.onclick = () => { if (longUrl) copyAndShow(longUrl, 'long'); };
                if (shortBtn) shortBtn.onclick = () => { if (shortUrl) copyAndShow(shortUrl, 'short'); };

                if (infoEl){
                    if (type === 'long') {
                        infoEl.innerHTML = `<strong style="color:var(--accent);">跨设备可用</strong> · 永久有效 · URL 含完整代码（${url.length} 字符）`;
                        infoEl.style.color = 'var(--muted)';
                    } else if (type === 'short') {
                        const expiryDate = new Date(Date.now() + ShareStore.EXPIRE_MS);
                        const dateStr = expiryDate.toLocaleDateString('zh-CN', {month:'long', day:'numeric'});
                        infoEl.innerHTML = `<strong style="color:#f59e0b;">仅限当前浏览器</strong> · 7 天有效期至 ${dateStr} · 跨设备请使用「下载/复制代码」`;
                        infoEl.style.color = 'var(--muted)';
                    } else {
                        infoEl.textContent = '链接生成失败，请使用「下载/复制代码」';
                        infoEl.style.color = 'var(--muted)';
                    }
                }

                modal.classList.add('active');
                Notification.show('分享链接已复制到剪贴板','success');
            };

            copyAndShow(primaryUrl, primaryType);
        }
        downloadCode(){
            const code=this.editor.getValue();
            const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '代码.py';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
            Notification.show('代码已下载','success');
        }
        copyOutput(){
            const outputElement=document.getElementById('output');
            const text = outputElement.textContent.trim();
            if(!text){ Notification.show('输出为空','error'); return; }
            navigator.clipboard.writeText(text).then(()=>{
                Notification.show('输出已复制到剪贴板','success');
            }).catch(()=>{
                Notification.show('复制输出失败，请手动复制','error');
            });
        }
        clearCode(){ if(confirm('确定要清空代码吗？')){ this.editor.setValue(''); StorageManager.saveCode(''); Notification.show('代码已清空','info'); } }
        clearOutput(){ document.getElementById('output').textContent=''; document.getElementById('exec-time').textContent='就绪'; try{ const model=this.editor?.editor?.getModel && this.editor.editor.getModel(); if(model && this.monaco?.editor?.setModelMarkers){ this.monaco.editor.setModelMarkers(model,'py',[]); } this.errorDecorations=this.editor.editor.deltaDecorations(this.errorDecorations||[],[]); this.lastErrorLine=null; document.getElementById('jump-error').style.display='none'; }catch{} document.querySelector('.status-indicator').className='status-indicator status-idle'; }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Sync body class with html early to keep loader and content consistent
        if (document.documentElement.classList.contains('dark-mode')) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }

        const urlParams=new URLSearchParams(window.location.search); let codeLoadedFromUrl=false;
        let payloadPresent=false, payloadDecoded=false;
        // decode from /s/<payload> path — try localStorage short ID first, then LZString
        try{
            const p = window.location.pathname;
            const idx = p.indexOf('/s/');
            if(idx !== -1){
                let pay = p.substring(idx + 3);
                if(pay.endsWith('/')) pay = pay.slice(0,-1);
                if(pay){
                    payloadPresent = true;
                    const obj = tryDecodePayload(pay);
                    if(obj){
                        payloadDecoded = true;
                        if(typeof obj.c==='string'){ StorageManager.saveCode(obj.c); codeLoadedFromUrl=true; }
                        if(obj.efs && Number.isFinite(obj.efs)){ StorageManager.setEditorFontSize(Math.round(obj.efs)); }
                        if(obj.ofs && Number.isFinite(obj.ofs)){ StorageManager.setOutputFontSize(Math.round(obj.ofs)); try{ const out=document.getElementById('output'); if(out) out.style.fontSize=`${Math.round(obj.ofs)}px`; }catch{} }
                        if(obj.th && (obj.th==='dark'||obj.th==='light')){ try{ StorageManager.setTheme(obj.th);}catch{} }
                        window.__pendingPermalink = { est: obj.est, esl: obj.esl, ost: obj.ost, tpl: obj.tpl };
                    }
                }
            }
        }catch(e){ console.warn('Failed to parse /s/ payload:',e); }
        // permalink compressed param 'z' — try localStorage short ID first, then LZString
        if(!codeLoadedFromUrl && urlParams.has('z')){
            payloadPresent = true;
            try{
                const z=urlParams.get('z');
                const obj = tryDecodePayload(z);
                if(obj){
                    payloadDecoded = true;
                    if(typeof obj.c==='string'){ StorageManager.saveCode(obj.c); codeLoadedFromUrl=true; }
                    if(obj.efs && Number.isFinite(obj.efs)){ StorageManager.setEditorFontSize(Math.round(obj.efs)); }
                    if(obj.ofs && Number.isFinite(obj.ofs)){ StorageManager.setOutputFontSize(Math.round(obj.ofs)); try{ const out=document.getElementById('output'); if(out) out.style.fontSize=`${Math.round(obj.ofs)}px`; }catch{} }
                    if(obj.th && (obj.th==='dark'||obj.th==='light')){ try{ StorageManager.setTheme(obj.th);}catch{} }
                    window.__pendingPermalink = { est: obj.est, esl: obj.esl, ost: obj.ost, tpl: obj.tpl };
                }
            }catch(e){ console.warn('Failed to parse z param:',e); }
        }
        // Legacy: base64 code param
        if(!codeLoadedFromUrl && urlParams.has('code')){ try{ let raw=urlParams.get('code')||''; let b64; try{ b64=decodeURIComponent(raw); }catch{ b64=raw; } b64=b64.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length%4) b64+='='; const bytes=atob(b64); const decoded=decodeURIComponent(escape(bytes)); StorageManager.saveCode(decoded); codeLoadedFromUrl=true; }catch(e){ console.warn('Failed to decode shared code:',e);} }

        // 支持 ?template=xxx：若没有其它代码��入，则按模板载入代码；否则仅反映选择
        try{
            if(urlParams.has('template')){
                const t = urlParams.get('template');
                // 记录待反映的模板键，供编辑器初始化后同步下拉框
                window.__pendingTpl = t;
                if(!codeLoadedFromUrl && typeof codeTemplates !== 'undefined' && t && codeTemplates[t]){
                    StorageManager.saveCode(codeTemplates[t]);
                    codeLoadedFromUrl = true;
                }
            }
        }catch(e){ console.warn('Failed to handle template param:', e); }

        // Purge expired share entries on page load
        try{ ShareStore.cleanup(); }catch{}

        // If a share payload was present but couldn't be decoded (expired or cross-browser)
        if(payloadPresent && !payloadDecoded && !codeLoadedFromUrl){
            setTimeout(()=>{ try{ Notification.show('分享链接已过期或不在当前浏览器中','warning',5000); }catch{} }, 2000);
        }

        // 以 SRI + 回退方式加载 LXGW 字体样式，失败时提示并回退到其他 CDN 或去除 SRI
        (function loadLXGWCss(){
            const primary = {
                href: 'https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-screen-webfont/1.6.0/lxgwwenkaiscreen.css',
                integrity: 'sha384-JSVn1znHuc8FVDp6lnwfdr+E/15Rtb/gBqsVMICU1fX4qsG81cPVTaneaJWFM8Ox',
            };
            const fallbacks = [
                { href: 'https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' },
                { href: 'https://unpkg.com/lxgw-wenkai-screen-webfont@1.6.0/lxgwwenkaiscreen.css' }
            ];
            const mount = (opt) => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = opt.href;
                link.referrerPolicy = 'no-referrer';
                if (opt.integrity) { link.integrity = opt.integrity; link.crossOrigin = 'anonymous'; }
                link.onerror = () => {
                    try { document.head.removeChild(link); } catch {}
                    const next = fallbacks.shift();
                    if (next) {
                        try { Notification.show('字体样式 SRI 校验失败，正在使用备用源','warning', 3500); } catch {}
                        mount(next);
                    } else if (opt.integrity) {
                        // 最后再尝试去掉 SRI 重新加载
                        try { Notification.show('所有备用源均不可用，放弃 SRI 继续加载字体','warning', 3500); } catch {}
                        mount({ href: opt.href });
                    }
                };
                document.head.appendChild(link);
            };
            mount(primary);
        })();

        const app = new PythonREPL();
        setTimeout(() => app.main(), 100);

        // Watchdog：如果 6 秒后仍处于 loading，则强制展示页面并提示
        setTimeout(() => {
            if (document.body.classList.contains('loading')) {
                document.body.classList.remove('loading');
                const overlay = document.getElementById('loader-overlay');
                if (overlay) overlay.style.display = 'none';
                try {
                    Notification.show('初始化较慢，已为你显示界面，稍后功能会自动就绪','warning', 4000);
                } catch {}
            }
        }, 6000);

        // 注册 Service Worker（提升弱网/离线体验）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
        }

        // 页面卸载/隐藏时清理 Worker 与定时器，避免内存泄漏
        const cleanup = () => {
            try {
                if (app && app.workerClient && app.workerClient.worker) {
                    try { app.workerClient.worker.terminate(); } catch {}
                    app.workerClient.worker = null;
                }
            } catch {}
            try { if (app && app._watchdogTimer) clearTimeout(app._watchdogTimer); } catch {}
        };
        // 页面真正关闭/刷新时清理
        window.addEventListener('pagehide', cleanup);
        // 移动端 Safari 切换标签页时可能不会触发 pagehide，visibilitychange 作为兜底
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                // 仅清理"未在运行"状态下的 worker；用户正在调试时不要清理
                try {
                    const isRunning = app && app.workerClient && app.workerClient.pending && app.workerClient.pending.size > 0;
                    if (!isRunning) cleanup();
                } catch {}
            }
        });
    });
</script>
