<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中…</title>
  <meta http-equiv="refresh" content="8; url=/">
  <style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:32px;color:#333} .box{max-width:600px;margin:0 auto;text-align:center} .muted{color:#666;font-size:14px}</style>
</head>
<body>
  <div class="box">
    <h1>页面不见了，正在为你跳转…</h1>
    <p class="muted">如果没有自动跳转，请<a href="/">点击这里回到首页</a>。</p>
  </div>
  <script>
    (function(){
      try{
        var loc = window.location;
        var path = loc.pathname || '';
        // Route /s/<payload> to share.html (link builder)
        var idx = path.indexOf('/s/');
        if(idx !== -1){
          var payload = path.substring(idx + 3);
          if(payload.endsWith('/')) payload = payload.slice(0,-1);
          var target = loc.origin + '/share.html' + (payload ? ('#' + payload) : '');
          window.location.replace(target);
          return;
        }
        // Otherwise, go home preserving query if present
        var home = loc.origin + '/' + (loc.search || '');
        window.location.replace(home);
      }catch(e){ /* ignore and let meta refresh handle */ }
    })();
  </script>
</body>
</html>
