<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中…</title>
  <meta http-equiv="refresh" content="8; url=/">
  <style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:32px;color:#333;background:#f7f7f7} @media (prefers-color-scheme: dark){body{color:#ddd;background:#1e1e1e}} .box{max-width:600px;margin:0 auto;text-align:center} .muted{color:#666;font-size:14px} @media (prefers-color-scheme: dark){.muted{color:#999}} .site-footer{margin-top:40px;padding:12px 0 10px;font-size:13px;text-align:center;color:#666;border-top:1px solid #d0d0d0;letter-spacing:.5px} @media (prefers-color-scheme: dark){.site-footer{color:#aaa;border-top:1px solid #333}} .site-footer .partner-link{color:#1a73e8;font-weight:600;text-decoration:none;position:relative;padding:0 4px} @media (prefers-color-scheme: dark){.site-footer .partner-link{color:#8ab4f8}} .site-footer .partner-link::after{content:'';position:absolute;left:0;bottom:-3px;width:100%;height:2px;background:linear-gradient(90deg,#66a6ff,#89f7fe);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;border-radius:2px} .site-footer .partner-link:hover::after{transform:scaleX(1)} @media (prefers-color-scheme: dark){.site-footer .partner-link::after{background:linear-gradient(90deg,#4e8df2,#5bd4e5)}} </style>
</head>
<body>
  <div class="box">
    <h1>页面不见了，正在为你跳转…</h1>
    <p class="muted">如果没有自动跳转，请<a href="/">点击这里回到首页</a>。</p>
  </div>
  <script>
    (function(){
      try{
        var loc = window.location;
        var path = loc.pathname || '';
        // Route /s/<payload> to share.html (link builder)
        var idx = path.indexOf('/s/');
        if(idx !== -1){
          var payload = path.substring(idx + 3);
          if(payload.endsWith('/')) payload = payload.slice(0,-1);
          var target = loc.origin + '/share.html' + (payload ? ('#' + payload) : '');
          window.location.replace(target);
          return;
        }
        // Otherwise, go home preserving query if present
        var home = loc.origin + '/' + (loc.search || '');
        window.location.replace(home);
      }catch(e){ /* ignore and let meta refresh handle */ }
    })();
  </script>
  <footer class="site-footer">本站由 <a class="partner-link" href="https://app.rainyun.com/" target="_blank" rel="noopener noreferrer" title="雨云 - 云服务器与算力服务">雨云</a> 提供计算服务</footer>
</body>
</html>
